<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M3DS – Modélisation 3D & NFC</title>

    <!-- Typo Orbitron -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Orbitron', sans-serif;
            background: #f5f5f5;
            color: #222;
        }

        html {
            scroll-behavior: smooth;
        }

        /* HEADER */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            background: #ffffffd9;
            backdrop-filter: blur(10px);
            border-bottom: 2px solid #d4af37;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        header nav a {
            margin-left: 25px;
            text-decoration: none;
            color: #222;
            font-weight: 600;
            transition: 0.3s;
        }

        header nav a:hover {
            color: #d4af37;
        }

        .logo {
            font-size: 28px;
            font-weight: 700;
            color: #d4af37;
        }

        /* HERO */
        .hero {
            padding: 120px 50px;
            text-align: center;
            background: linear-gradient(to bottom, #ffffff, #f0f0f0);
        }

        .hero h1 {
            font-size: 42px;
            margin-bottom: 10px;
        }

        .hero .underline {
            width: 120px;
            height: 4px;
            background: #d4af37;
            margin: 10px auto 20px;
            border-radius: 2px;
            animation: glow 2s infinite alternate;
        }

        @keyframes glow {
            from { box-shadow: 0 0 5px #d4af37; }
            to { box-shadow: 0 0 15px #d4af37; }
        }

        .cta-button {
            display: inline-block;
            padding: 12px 25px;
            background: #d4af37;
            color: white;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
            transition: 0.3s;
            text-decoration: none;
            font-weight: 600;
        }

        .cta-button:hover {
            transform: scale(1.05);
            background: #b8922c;
        }

        /* SECTION TITLES */
        section {
            padding: 80px 50px;
        }

        h2 {
            text-align: center;
            font-size: 32px;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: #555;
            margin-bottom: 40px;
        }

        /* CARROUSEL */
        .carousel-container {
            width: 40%;
            height: 250px;
            margin: auto;
            overflow: hidden;
            position: relative;
            border-radius: 12px;
            box-shadow: 0 4px 20px #00000020;
            background: #f5f5f5;
        }

        .carousel-slide {
            display: flex;
            height: 100%;
            transition: transform 0.5s ease;
        }

        .carousel-slide img {
            flex: 0 0 100%;
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #f5f5f5;
        }

        .carousel-buttons span {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 40px;
            color: #d4af37;
            cursor: pointer;
            padding: 10px;
            user-select: none;
            transition: 0.3s;
        }

        .carousel-buttons span:hover {
            color: #b8922c;
        }

        .prev { left: 10px; }
        .next { right: 10px; }

        /* LÉGENDE */
        .carousel-caption {
            text-align: center;
            margin-top: 10px;
            font-size: 18px;
            color: #d4af37;
            font-weight: 600;
        }

        /* SERVICES */
        .services {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        .card {
            width: 280px;
            padding: 25px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 15px #00000015;
            text-align: center;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 8px 25px #00000030;
        }

        /* À PROPOS */
        .apropos {
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
        }

        .apropos img {
            width: 380px;
            border-radius: 12px;
            transform: rotate(-2deg);
            box-shadow: 0 4px 20px #00000030;
        }

        .timeline {
            border-left: 3px solid #d4af37;
            padding-left: 20px;
        }

        .timeline div {
            margin-bottom: 20px;
        }

        /* AVIS CLIENTS */
        #avis {
            padding: 80px 50px;
        }

        .avis-container {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        .avis-card {
            width: 280px;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px #00000015;
            text-align: center;
            transition: 0.3s;
        }

        .avis-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 8px 25px #00000030;
        }

        .avis-text {
            font-size: 16px;
            color: #444;
            font-style: italic;
        }

        .avis-author {
            margin-top: 15px;
            font-weight: 600;
            color: #d4af37;
        }
<section id="projets">
    <h2>Projets en cours de développement</h2>
    <p class="subtitle">Nos dernières réalisations en modélisation et impression 3D</p>

    <div class="services">

        <div class="card">
            <img src="https://m3ds-fr.github.io/img/bluetrack.png" style="width:100%; border-radius:8px;">
            <h3>BlueTrack</h3>
            <p>Télécommande Bluetooth minimaliste pour contrôler la musique du smartphone.</p>
            <p>Boîtier imprimé en 3D, boutons ergonomiques et électronique intégrée.</p>
            <a href="https://www.tiktok.com/@m3dsfr/video/7577473919280581910" target="_blank">🎥 Voir la vidéo</a>
        </div>

        <div class="card">
            <img src="https://m3ds-fr.github.io/img/baf.png" style="width:100%; border-radius:8px;">
            <h3>Projet B.A.F</h3>
            <p>Barrière Anti Fumée pour initier mon fils à la soudure en toute sécurité.</p>
            <a href="https://www.tiktok.com/@m3ds-fr/video/7576197745266953494" target="_blank">🎥 Voir la vidéo</a>
        </div>

    </div>
</section>

<!-- ⭐⭐ SECTION AVIS CLIENTS ⭐⭐ -->
<section id="avis">
    <h2>Ce que pensent mes clients</h2>
    <p class="subtitle">Ils ont fait confiance à M3DS</p>

    <div class="avis-container">

        <div class="avis-card">
            <p class="avis-text">“Travail impeccable, rapide et très professionnel. Le modèle 3D correspondait parfaitement à mes attentes.”</p>
            <p class="avis-author">— Julien R.</p>
        </div>

        <div class="avis-card">
            <p class="avis-text">“Super expérience ! Impression 3D de qualité et très bon accompagnement du début à la fin.”</p>
            <p class="avis-author">— Marie L.</p>
        </div>

        <div class="avis-card">
            <p class="avis-text">“David a su créer une pièce sur mesure introuvable ailleurs. Je recommande à 100%.”</p>
            <p class="avis-author">— Thomas G.</p>
        </div>

    </div>
</section>

<!-- ⭐⭐ BOUTON LAISSER UN AVIS ⭐⭐ -->
<div style="text-align:center; margin-top:40px;">
    <a href="#form-avis" class="cta-button">Laisser un avis</a>
</div>

<!-- ⭐⭐ FORMULAIRE AVIS ⭐⭐ -->
<section id="form-avis">
    <h2>Laisser un avis</h2>
    <p class="subtitle">Votre retour compte beaucoup pour nous</p>

    <form class="contact-form" action="https://formspree.io/f/xyknrjre" method="POST">
        <input type="text" name="nom_client" placeholder="Votre nom (ou initiales)" required>
        <textarea name="avis_client" placeholder="Votre avis" required></textarea>

        <button type="submit">Envoyer mon avis</button>

        <p id="avis-status" style="text-align:center; margin-top:15px; color:#d4af37;"></p>
    </form>
</section>

<!-- ⭐⭐ SECTION CONTACT ⭐⭐ -->
<section id="contact">
    <h2>Contact</h2>
    <p class="subtitle">Une question, un projet ? Parlons-en.</p>

    <form class="contact-form" action="https://formspree.io/f/xyknrjre" method="POST">
        <input type="text" name="name" placeholder="Votre nom" required>
        <input type="email" name="email" placeholder="Votre email" required>
        <textarea name="message" placeholder="Votre message" required></textarea>

        <button type="submit">Envoyer</button>

        <p id="form-status" style="text-align:center; margin-top:15px; color:#d4af37;"></p>
    </form>
</section>

<footer>
    <p>@2026 - M3DS – Modélisation & Impression 3D</p>
    <p>Mentions légales • Politique de confidentialité</p>
</footer>

<script>
/* CARROUSEL */
let index = 0;
const slide = document.querySelector('.carousel-slide');
const images = document.querySelectorAll('.carousel-slide img');

const captions = [
    "Amortisseur de WC",
    "Butée de tiroir de lave-vaissel",
    "Charnière pour lit d'appoint IKEA",
    "Emporte-pièce personnalisé",
    "Support pour canne de volet roulant",
    "Médaillon NFC",
    "Stand pour Carte de Visite",
];

function updateCarousel() {
    slide.style.transform = `translateX(-${index * 100}%)`;
    document.getElementById("carousel-caption").innerText = captions[index];
}

document.querySelector('.next').onclick = () => {
    index = (index + 1) % images.length;
    updateCarousel();
};

document.querySelector('.prev').onclick = () => {
    index = (index - 1 + images.length) % images.length;
    updateCarousel();
};

/* FORMULAIRE CONTACT */
const form = document.querySelector(".contact-form");
const statusTxt = document.getElementById("form-status");

form.addEventListener("submit", async (e) => {
    e.preventDefault();
    statusTxt.innerText = "Envoi en cours...";

    const data = new FormData(form);

    const response = await fetch(form.action, {
        method: "POST",
        body: data,
        headers: { 'Accept': 'application/json' }
    });

    if (response.ok) {
        statusTxt.innerText = "Message envoyé avec succès !";
        form.reset();
    } else {
        statusTxt.innerText = "Erreur lors de l'envoi. Réessayez.";
    }
});

/* FORMULAIRE AVIS */
const avisForm = document.querySelector("#form-avis form");
const avisStatus = document.getElementById("avis-status");

avisForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    avisStatus.innerText = "Envoi en cours...";

    const data = new FormData(avisForm);

    const response = await fetch(avisForm.action, {
        method: "POST",
        body: data,
        headers: { 'Accept': 'application/json' }
    });

    if (response.ok) {
        avisStatus.innerText = "Merci ! Votre avis a bien été envoyé.";
        avisForm.reset();
    } else {
        avisStatus.innerText = "Erreur lors de l'envoi. Réessayez.";
    }
});
</script>

</body>
</html>
