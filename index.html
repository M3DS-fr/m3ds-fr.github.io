<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M3DS – Modélisation 3D & NFC</title>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Orbitron', sans-serif;
            background: #f5f5f5;
            color: #222;
        }

        html { scroll-behavior: smooth; }

        /* HEADER */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            background: #ffffffd9;
            backdrop-filter: blur(10px);
            border-bottom: 2px solid #d4af37;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        header nav a {
            margin-left: 25px;
            text-decoration: none;
            color: #222;
            font-weight: 600;
            transition: 0.3s;
        }

        header nav a:hover { color: #d4af37; }

        .logo {
            font-size: 28px;
            font-weight: 700;
            color: #d4af37;
        }

        /* HERO */
        .hero {
            padding: 120px 50px;
            text-align: center;
            background: linear-gradient(to bottom, #ffffff, #f0f0f0);
        }

        .hero h1 { font-size: 42px; margin-bottom: 10px; }

        .underline {
            width: 120px;
            height: 4px;
            background: #d4af37;
            margin: 10px auto 20px;
            border-radius: 2px;
            animation: glow 2s infinite alternate;
        }

        @keyframes glow {
            from { box-shadow: 0 0 5px #d4af37; }
            to { box-shadow: 0 0 15px #d4af37; }
        }

        .cta-button {
            display: inline-block;
            padding: 12px 25px;
            background: #d4af37;
            color: white;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
            transition: 0.3s;
            text-decoration: none;
            font-weight: 600;
        }

        .cta-button:hover { transform: scale(1.05); background: #b8922c; }

        /* SECTIONS */
        section { padding: 80px 50px; }

        h2 { text-align: center; font-size: 32px; margin-bottom: 10px; }

        .subtitle { text-align: center; color: #555; margin-bottom: 40px; }

        /* CARROUSEL IMAGES */
        .carousel-container {
            width: 40%;
            height: 250px;
            margin: auto;
            overflow: hidden;
            position: relative;
            border-radius: 12px;
            box-shadow: 0 4px 20px #00000020;
            background: #f5f5f5;
        }

        .carousel-slide {
            display: flex;
            height: 100%;
            transition: transform 0.5s ease;
        }

        .carousel-slide img {
            flex: 0 0 100%;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .carousel-buttons span {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 40px;
            color: #d4af37;
            cursor: pointer;
            padding: 10px;
            transition: 0.3s;
        }

        .carousel-buttons span:hover { color: #b8922c; }

        .prev { left: 10px; }
        .next { right: 10px; }

        .carousel-caption {
            text-align: center;
            margin-top: 10px;
            font-size: 18px;
            color: #d4af37;
            font-weight: 600;
        }

        /* SERVICES */
        .services {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        .card {
            width: 280px;
            padding: 25px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 15px #00000015;
            text-align: center;
            transition: 0.3s;
        }

        .card:hover { transform: translateY(-8px); box-shadow: 0 8px 25px #00000030; }

        /* À PROPOS */
        .apropos {
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
        }

        .apropos img {
            width: 380px;
            border-radius: 12px;
            transform: rotate(-2deg);
            box-shadow: 0 4px 20px #00000030;
        }

        .timeline {
            border-left: 3px solid #d4af37;
            padding-left: 20px;
        }

        .timeline div { margin-bottom: 20px; }

        /* ============================
           AVIS — CARROUSEL COMPLET
           ============================ */

        .avis-carousel-container {
            width: 100%;
            max-width: 700px;
            margin: auto;
            overflow: hidden;
            position: relative;
            min-height: 280px;
            padding: 20px 0;
        }

        .avis-buttons {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .avis-buttons span {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 40px;
            color: #d4af37;
            cursor: pointer;
            padding: 10px;
            transition: 0.3s;
            user-select: none;
            pointer-events: auto;
            z-index: 5;
        }

        .avis-prev { left: 10px; }
        .avis-next { right: 10px; }

        .avis-carousel-slide {
            display: flex;
            flex-wrap: nowrap;
            transition: transform 0.5s ease;
            align-items: center;
        }

        .avis-card {
            flex: 0 0 100%;
            box-sizing: border-box;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px #00000015;
            text-align: center;

            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .avis-text {
            font-size: 16px;
            color: #444;
            font-style: italic;
            margin-bottom: 10px;
            max-width: 90%;
            word-wrap: break-word;
            white-space: normal;
            text-align: center;
        }

        .avis-author {
            margin-top: 10px;
            font-weight: 600;
            color: #d4af37;
        }

        /* FORMULAIRE AVIS */
        .contact-form-avis {
            width: 60%;
            margin: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .contact-form-avis input,
        .contact-form-avis textarea {
            padding: 12px;
            border: 2px solid #d4af37;
            border-radius: 8px;
            font-size: 16px;
            font-family: 'Orbitron';
        }

        .contact-form-avis button {
            padding: 12px;
            background: #d4af37;
            border: none;
            color: white;
            font-size: 18px;
            cursor: pointer;
            border-radius: 8px;
            transition: 0.3s;
        }

        /* CONTACT */
        .contact-form {
            width: 60%;
            margin: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .contact-form input,
        .contact-form textarea {
            padding: 12px;
            border: 2px solid #d4af37;
            border-radius: 8px;
            font-size: 16px;
            font-family: 'Orbitron';
        }

        .contact-form button {
            padding: 12px;
            background: #d4af37;
            border: none;
            color: white;
            font-size: 18px;
            cursor: pointer;
            border-radius: 8px;
            transition: 0.3s;
        }

        footer {
            background: #111;
            color: white;
            padding: 40px 50px;
            text-align: center;
            position: relative;
        }

        footer::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            height: 3px;
            width: 100%;
            background: #d4af37;
            box-shadow: 0 0 15px #d4af37;
        }
    </style>
</head>

<body>

<!-- TON HTML (inchangé) -->
<!-- … je ne le recopie pas ici pour éviter un message trop long -->
<!-- MAIS si tu veux, je peux aussi te renvoyer l’index COMPLET avec HTML + CSS + JS -->

<script>
/* CARROUSEL IMAGES */
let index = 0;
const slide = document.querySelector('.carousel-slide');
const images = document.querySelectorAll('.carousel-slide img');

const captions = [
    "Amortisseur de WC",
    "Butée de tiroir de lave-vaissel",
    "Charnière pour lit d'appoint IKEA",
    "Emporte-pièce personnalisé",
    "Support pour canne de volet roulant",
    "Médaillon NFC",
    "Stand pour Carte de Visite",
];

function updateCarousel() {
    slide.style.transform = `translateX(-${index * 100}%)`;
    document.getElementById("carousel-caption").innerText = captions[index];
}

document.querySelector('.next').onclick = () => {
    index = (index + 1) % images.length;
    updateCarousel();
};

document.querySelector('.prev').onclick = () => {
    index = (index - 1 + images.length) % images.length;
    updateCarousel();
};

/* FORMULAIRE CONTACT */
const contactForm = document.querySelector("#contact .contact-form");
const contactStatus = document.getElementById("form-status");

contactForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    contactStatus.innerText = "Envoi en cours...";

    const data = new FormData(contactForm);

    const response = await fetch(contactForm.action, {
        method: "POST",
        body: data,
        headers: { 'Accept': 'application/json' }
    });

    if (response.ok) {
        contactStatus.innerText = "Message envoyé avec succès !";
        contactForm.reset();
    } else {
        contactStatus.innerText = "Erreur lors de l'envoi. Réessayez.";
    }
});

/* FORMULAIRE AVIS */
const avisForm = document.querySelector("#form-avis form");
const avisStatus = document.getElementById("avis-status");

avisForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    avisStatus.innerText = "Envoi en cours...";

    const data = new FormData(avisForm);

    const response = await fetch(avisForm.action, {
        method: "POST",
        body: data,
        headers: { 'Accept': 'application/json' }
    });

    if (response.ok) {
        avisStatus.innerText = "Merci ! Votre avis a bien été envoyé.";
        avisForm.reset();
    } else {
        avisStatus.innerText = "Erreur lors de l'envoi. Réessayez.";
    }
});

/* CARROUSEL AVIS */
let avisIndex = 0;
const avisSlide = document.querySelector('.avis-carousel-slide');
const avisCards = document.querySelectorAll('.avis-carousel-slide .avis-card');
const avisContainer = document.querySelector('.avis-carousel-container');

/* Largeur totale */
avisSlide.style.width = `${avisCards.length * 100}%`;

/* Chaque carte = 100% */
avisCards.forEach(card => {
    card.style.flex = "0 0 100%";
});

/* Mise à jour */
function updateAvisCarousel() {
    const width = avisContainer.offsetWidth;
    avisSlide.style.transform = `translateX(-${avisIndex * width}px)`;
}

/* Boutons */
document.querySelector('.avis-next').onclick = () => {
    avisIndex = (avisIndex + 1) % avisCards.length;
    updateAvisCarousel();
};

document.querySelector('.avis-prev').onclick = () => {
    avisIndex = (avisIndex - 1 + avisCards.length) % avisCards.length;
    updateAvisCarousel();
};

/* Auto */
setInterval(() => {
    avisIndex = (avisIndex + 1) % avisCards.length;
    updateAvisCarousel();
}, 5000);

/* Position initiale */
updateAvisCarousel();
</script>

</body>
</html>
