<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Activation du Médaillon NFC</title>
<style>
    body {
        font-family: Arial, sans-serif;
        max-width: 500px;
        margin: auto;
        padding: 20px;
    }
    input, button {
        width: 100%;
        padding: 10px;
        margin-top: 10px;
        box-sizing: border-box;
    }
    .recap {
        margin-top: 20px;
        padding: 15px;
        border: 1px solid #ccc;
        background: #f9f9f9;
    }
    .id-badge {
        font-size: 1.4em;
        font-weight: bold;
        color: #b30000;
    }
</style>
</head>
<body>

<h2>Activation du Médaillon NFC</h2>
<p>Remplissez les informations ci-dessous pour générer l’identifiant de votre médaillon.</p>

<label>Nom de l'animal</label>
<input id="animalName" type="text">

<label>Race</label>
<input id="animalRace" type="text">

<label>Âge</label>
<input id="animalAge" type="text">

<label>Nom du propriétaire</label>
<input id="ownerName" type="text">

<label>Téléphone</label>
<input id="ownerPhone" type="text">

<label>Email</label>
<input id="ownerEmail" type="email">

<button onclick="submitForm()">Générer l’ID du médaillon</button>

<div id="recap" class="recap" style="display:none;">
    <h3>Votre médaillon est prêt</h3>
    <p>Voici l’identifiant unique de votre médaillon :</p>
    <p class="id-badge" id="badgeId"></p>
    <p><strong>Récapitulatif :</strong></p>
    <ul>
        <li><span id="rAnimal"></span></li>
        <li><span id="rOwner"></span></li>
        <li><span id="rPhone"></span></li>
        <li><span id="rEmail"></span></li>
    </ul>
</div>

<script>
function generateID() {
    return Math.random().toString(36).substring(2, 10).toUpperCase();
}

function submitForm() {
    const id = generateID();

    const animalName = document.getElementById("animalName").value;
    const animalRace = document.getElementById("animalRace").value;
    const animalAge = document.getElementById("animalAge").value;
    const ownerName = document.getElementById("ownerName").value;
    const ownerPhone = document.getElementById("ownerPhone").value;
    const ownerEmail = document.getElementById("ownerEmail").value;

    // Affichage du récap
    document.getElementById("badgeId").textContent = id;
    document.getElementById("rAnimal").textContent = "Animal : " + animalName + " (" + animalRace + ", " + animalAge + ")";
    document.getElementById("rOwner").textContent = "Propriétaire : " + ownerName;
    document.getElementById("rPhone").textContent = "Téléphone : " + ownerPhone;
    document.getElementById("rEmail").textContent = "Email : " + ownerEmail;

    document.getElementById("recap").style.display = "block";

    // Envoi vers ton Worker Cloudflare
    fetch("https://noisy-silence-a8ff.maker3dservices.workers.dev/activate", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            id: id,
            animalName: animalName,
            animalRace: animalRace,
            animalAge: animalAge,
            ownerName: ownerName,
            ownerPhone: ownerPhone,
            ownerEmail: ownerEmail
        })
    })
    .then(async r => {
        const txt = await r.text();
        console.log("Worker response:", r.status, txt);
    })
    .catch(err => console.error("Erreur Worker:", err));
}
</script>

</body>
</html>
